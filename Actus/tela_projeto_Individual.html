/*código da para pegar o arquivo e visualização*/
const input = document.getElementById('fileUpload');
    const preview = document.getElementById('preview');

    input.addEventListener('change', () => {
      const file = input.files[0];
      preview.innerHTML = ""; // Limpa prévia anterior

      if (!file) return;

      const fileURL = URL.createObjectURL(file);
      const fileType = file.type;

      if (fileType.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = fileURL;
        img.style.maxWidth = "100%";
        img.style.maxHeight = "600px";
        preview.appendChild(img);
      } 
      else if (fileType === "application/pdf") {
        const embed = document.createElement("embed");
        embed.src = fileURL;
        embed.type = "application/pdf";
        embed.width = "100%";
        embed.height = "600px";
        preview.appendChild(embed);
      } 
      else if (fileType.startsWith("video/")) {
        const video = document.createElement("video");
        video.src = fileURL;
        video.controls = true;
        video.width = 600;
        preview.appendChild(video);
      }
      else if (fileType.startsWith("audio/")) {
        const audio = document.createElement("audio");
        audio.src = fileURL;
        audio.controls = true;
        preview.appendChild(audio);
      }
      else if (fileType.startsWith("text/") || file.name.endsWith(".txt")) {
        const reader = new FileReader();
        reader.onload = () => {
          const text = document.createElement("pre");
          text.textContent = reader.result;
          preview.appendChild(text);
        };
        reader.readAsText(file);
      } 
      else {
        preview.textContent = "Pré-visualização não disponível para esse tipo de arquivo.";
      }
    });

      document.querySelector('input[name="Nome_da_Etapa"]').value = objeto_Etapa['Nome_da_Etapa'];

          document.querySelector(`input[name=marcado${num}]`).checked = objeto_Etapa[`marcado${num}`];

     }




    //Exluir Etapa
    function botao_excluir_etapa(){

      const ListaDeEtapas = document.getElementById('lista_de_etapas');
      
      if(document.getElementById('nome_etapa').value != ''){
        try{
          for(let c in dicionario_de_etapas){
            if(dicionario_de_etapas[c] == ListaDeEtapas.options[ListaDeEtapas.selectedIndex].text){
              localStorage.removeItem(c);
              delete dicionario_de_etapas[c];
              for(let i=5;i < card.length ; i++){

                  card.splice(i, 1);
                  num_pos_etapa--;
                  localStorage.setItem(`card${numero_card}`, JSON.stringify(card));
                }
              }
              localStorage.setItem('dicionario_de_etapas', JSON.stringify(dicionario_de_etapas)); 
              break;
            }
          }
          ListaDeEtapas.options[ListaDeEtapas.selectedIndex].remove(); 
          ListaDeEtapas.selectedIndex = 0;
          carrega_dados_da_Etapa();
        }catch(erro){
          document.getElementById('formulario_da_Etapa').reset();
          const linhas = document.querySelectorAll('.itens_da_etapa');
          for(let i=2 ; i < linhas.length ; i++ ){
          linhas[i].remove();}
        }
      }else{
        document.getElementById('formulario_da_Etapa').reset();
        const linhas = document.querySelectorAll('.itens_da_etapa');
        for(let i=2 ; i < linhas.length ; i++ ){
        linhas[i].remove();}
        }

        if(ListaDeEtapas.length == 0){
          botao_Nova_Etapa();
        }
    }
