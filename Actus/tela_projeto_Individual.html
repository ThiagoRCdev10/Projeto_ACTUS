/*código da para pegar o arquivo e visualização*/
const input = document.getElementById('fileUpload');
    const preview = document.getElementById('preview');

    input.addEventListener('change', () => {
      const file = input.files[0];
      preview.innerHTML = ""; // Limpa prévia anterior

      if (!file) return;

      const fileURL = URL.createObjectURL(file);
      const fileType = file.type;

      if (fileType.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = fileURL;
        img.style.maxWidth = "100%";
        img.style.maxHeight = "600px";
        preview.appendChild(img);
      } 
      else if (fileType === "application/pdf") {
        const embed = document.createElement("embed");
        embed.src = fileURL;
        embed.type = "application/pdf";
        embed.width = "100%";
        embed.height = "600px";
        preview.appendChild(embed);
      } 
      else if (fileType.startsWith("video/")) {
        const video = document.createElement("video");
        video.src = fileURL;
        video.controls = true;
        video.width = 600;
        preview.appendChild(video);
      }
      else if (fileType.startsWith("audio/")) {
        const audio = document.createElement("audio");
        audio.src = fileURL;
        audio.controls = true;
        preview.appendChild(audio);
      }
      else if (fileType.startsWith("text/") || file.name.endsWith(".txt")) {
        const reader = new FileReader();
        reader.onload = () => {
          const text = document.createElement("pre");
          text.textContent = reader.result;
          preview.appendChild(text);
        };
        reader.readAsText(file);
      } 
      else {
        preview.textContent = "Pré-visualização não disponível para esse tipo de arquivo.";
      }
    });
    </script>
