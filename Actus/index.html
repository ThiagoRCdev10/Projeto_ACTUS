<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="imagens/logo_actus.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actus</title>
    <link rel="stylesheet" href="styles.css" id="folha_de_estilos">
  </head>
  <body class="container_body">
    
    <button onclick="mudar_tema()" class="botao_tema" id="botao_alterar_tema">Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;"></button>

    <div class="conteiner_Principal">
      <form id="formulario">
        <h1 class="container_Titulo">Login</h1>
        <div class="container_logo">
          <img src="imagens/logo_actus.png" alt="logo">
        <h2 class="nome_Actus">Actus</h2>
        </div>
        <input id="email" type="email" class="container_input" placeholder="Digite seu email">
        <input id="senha" type="password" class="container_input" placeholder="Digite sua senha"> 
        <button type="button"  class="botao" onclick="logar()">Entrar</button>
        <div id="opcoes_login">
          <a href="tela_cadastro.html" class="outra_opcao">Não possui cadastro?</a>
          <a href="esqueceu_Senha.html" class="outra_opcao">Esqueceu a senha?</a>
        </div>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
    
    <script>
      function logar(){

        let email = document.getElementById('email').value;
        let senha = document.getElementById('senha').value;
        
        
        if(email == ''){
          alert('Digite seu Email');
        }else if(senha == ''){
          alert('Digite sua Senha.');
        }else{
          let executar = true;
          //vê se o usuário está cadastrado
          for (let i = 0; i < localStorage.length; i++) {
              const chave = localStorage.key(i);
              if (chave.startsWith('usuario')) {
                const valor = JSON.parse(localStorage.getItem(chave));
                if(email == valor[1] && senha == valor[4]){
                  let usuario_logado = [];
                  usuario_logado.push(chave); 
                  localStorage.setItem('user_logado', JSON.stringify(usuario_logado)); 
                  executar = false;
                  window.location.href = "tela_de_Projetos.html";
                }
              }
          }
          if(executar){alert('O Email ou a Senha estam incorretos.');}   
        }
      }


   //Mudar tema do site
   var botao_alterar_tema =  document.getElementById('botao_alterar_tema');
      var tema = JSON.parse(localStorage.getItem('Tema'));
      var link = document.getElementById('folha_de_estilos');
      if(!tema){
            tema = {};
            tema['status'] = 'claro';}

      function mudar_tema(){
        if (tema['status'] == 'claro') {
          tema['status'] = 'escuro';
          link.href = "stylesEscuro.css";
          botao_alterar_tema.style.backgroundColor = 'white';
          botao_alterar_tema.style.color = 'black';
          botao_alterar_tema.innerHTML ='Tema Claro<img src="imagens/sol_semFundo.png" alt="img_sol" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
        } else {
          tema['status'] = 'claro';
          link.href = "styles.css";
          botao_alterar_tema.style.backgroundColor = 'black';
          botao_alterar_tema.style.color = 'white';
          botao_alterar_tema.innerHTML ='Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
        }
        localStorage.setItem('Tema', JSON.stringify(tema)); 
      }

      //Roda quando o DOM inicializa para ver o tema do site
      document.addEventListener('DOMContentLoaded', function () {  
        if(!tema){
            tema = {};
            tema['status'] = 'claro';
          }else{
            if (tema['status'] == 'claro') {
              tema['status'] = 'claro';
              link.href = "styles.css";
              botao_alterar_tema.style.backgroundColor = 'black';
              botao_alterar_tema.style.color = 'white';
              botao_alterar_tema.innerHTML ='Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
            } else {
              tema['status'] = 'escuro';
              link.href = "stylesEscuro.css";
              botao_alterar_tema.style.backgroundColor = 'white';
              botao_alterar_tema.style.color = 'black';
              botao_alterar_tema.innerHTML ='Tema Claro<img src="imagens/sol_semFundo.png" alt="img_sol" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
            }
          }
        });
    </script>

  </body>
</html>
