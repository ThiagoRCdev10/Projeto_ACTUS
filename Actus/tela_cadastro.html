<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="imagens/logo_actus.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actus</title>
    <link rel="stylesheet" href="styles.css" id="folha_de_estilos">

  </head>
  <body class="container_body">

    <button onclick="mudar_tema()" class="botao_tema" id="botao_alterar_tema">Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;"></button>

    <div class="conteiner_Cadastro">
      <form>
        <h1 class="container_Titulo">Cadastro</h1>
        <div class="container_logo">
          <img src="imagens/logo_actus.png" alt="logo">
        <h2 class="nome_Actus">Actus</h2>
        </div>
        <input required type="text" class="container_input itens_cadastro" placeholder="Nome Completo">
        <input required type="email" class="container_input itens_cadastro" placeholder="exemplo@gmail.com">
        <input required type="date" class="container_input itens_cadastro" placeholder="Data de Nascimento">
        <input required type="text" class="container_input itens_cadastro" placeholder="Cargo">
        <input required type="password" class="container_input itens_cadastro" placeholder="Senha">
        <input required type="password" class="container_input itens_cadastro" placeholder="Repita a senha" id="senha_repetida">
        <button type="button"  class="botao" onclick="cadastrar()">Entrar</button>

      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
        function cadastrar(){
          const itens_cadastro = document.querySelectorAll('.itens_cadastro');
          let vetor_dados = [];
          const senha_repetida = document.getElementById('senha_repetida') ;
          itens_cadastro.forEach(item => {
            vetor_dados.push(item.value);
          });
          if(vetor_dados[0]==''||vetor_dados[1]==''||vetor_dados[2]==''||vetor_dados[3]==''||vetor_dados[4]==''||vetor_dados[5]==''){
            alert('Preencha todos os campos');
          }
          else if(vetor_dados[4] != vetor_dados[5]){
            alert('Repita a mesma senha, por favor!');
            senha_repetida.focus();
          }
          else{
            let ja_existe = false;
            let nums_usuario = [];
            for (let i = 0; i < localStorage.length; i++) {
              const chave = localStorage.key(i);
              if (chave.startsWith('usuario')) {
                nums_usuario.push(parseInt(chave.replace('usuario','')));
                const valor = JSON.parse(localStorage.getItem(chave));
                //verifica se email e senha ja existem
                if(vetor_dados[1] == valor[1]){
                  alert('Esse usuário já existe. Escolha outro Email.');
                  ja_existe = true;
                  break;
                }

              }
            }
            if(!ja_existe){
              if(nums_usuario.length == 0){
                localStorage.setItem(`usuario0`, JSON.stringify(vetor_dados));
                window.location.href = "index.html";
              }else{
                let max_num_usuario = Math.max(...nums_usuario);
                localStorage.setItem(`usuario${max_num_usuario+1}`, JSON.stringify(vetor_dados));
                window.location.href = "index.html";
              }
            } 
          }
            
        }
           
      

      //Mudar tema do site
      var tema = JSON.parse(localStorage.getItem('Tema'));
      var link = document.getElementById('folha_de_estilos');
      if(!tema){
        tema = {};
        tema['status'] = 'claro';
      }
   //Mudar tema do site
   var botao_alterar_tema =  document.getElementById('botao_alterar_tema');
      var tema = JSON.parse(localStorage.getItem('Tema'));
      var link = document.getElementById('folha_de_estilos');
      if(!tema){
            tema = {};
            tema['status'] = 'claro';}

      function mudar_tema(){
        if (tema['status'] == 'claro') {
          tema['status'] = 'escuro';
          link.href = "stylesEscuro.css";
          botao_alterar_tema.style.backgroundColor = 'white';
          botao_alterar_tema.style.color = 'black';
          botao_alterar_tema.innerHTML ='Tema Claro<img src="imagens/sol_semFundo.png" alt="img_sol" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
        } else {
          tema['status'] = 'claro';
          link.href = "styles.css";
          botao_alterar_tema.style.backgroundColor = 'black';
          botao_alterar_tema.style.color = 'white';
          botao_alterar_tema.innerHTML ='Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
        }
        localStorage.setItem('Tema', JSON.stringify(tema)); 
      }

      //Roda quando o DOM inicializa para ver o tema do site
      document.addEventListener('DOMContentLoaded', function () {  
        if(!tema){
            tema = {};
            tema['status'] = 'claro';
          }else{
            if (tema['status'] == 'claro') {
              tema['status'] = 'claro';
              link.href = "styles.css";
              botao_alterar_tema.style.backgroundColor = 'black';
              botao_alterar_tema.style.color = 'white';
              botao_alterar_tema.innerHTML ='Tema Escuro<img src="imagens/lua.png" alt="img_lua" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
            } else {
              tema['status'] = 'escuro';
              link.href = "stylesEscuro.css";
              botao_alterar_tema.style.backgroundColor = 'white';
              botao_alterar_tema.style.color = 'black';
              botao_alterar_tema.innerHTML ='Tema Claro<img src="imagens/sol_semFundo.png" alt="img_sol" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;">';
            }
          }
        });

        
    </script>
  </body>
</html>
