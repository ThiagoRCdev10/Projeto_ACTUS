<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="imagens/logo_actus.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actus</title>
    <link rel="stylesheet" href="styles.css">

  </head>
  <body style="background: linear-gradient(45deg, #0d47a1 0%, #1976d2 20%, #42a5f5 45%, #81d4fa 70%, #e1f5fe 100%); height: 100vh;background-attachment: fixed">

    <nav class="container_navegacao" style="justify-content: flex-end;">
      
      <div style="padding-right: 50px;" class="div_logo_menu">
              <div class="container_logo_Tela_ins_Cod">
                  <img src="imagens/logo_actus.png" alt="logo">
                  <h2 style="color: #095185; font-size: 18pt;">Actus</h2>
              </div>
              <button class="botao_menu_sanduiche" onclick="abrir_opcoes_do_Menu()">
                  <img src="imagens/menu_sanduiche-semfundo.png" width="60" height="60" alt="menu_sanduíche">
              </button>
      </div>   
 </nav>
 
    <div id="botao_menu"></div>
    
    <main class="container_posicao_centralizada">
    <div class="conteiner_esqueceu_Senha" style="height: fit-content;">
        <h1 style="text-align: center; font-size: 40pt;">Editar Perfil</h1>
      <form>
        <div class="container_logo">
          <img src="imagens/logo_actus.png" alt="logo">
        <h2 class="nome_Actus" style="font-size: 20pt;">Actus</h2>
        </div>
        <div class="container_perfil_bolinha" onclick="window.alert('Alterar perfil!');">
            <div class="imagem_de_perfil"><img src="imagens/img_perfil_sem_Fundo.png" alt="img_perfl" width="100px"></div>
            <div class="bolinha_perfil"><p>+</p></div>
        </div>
        <label class="label_digite_email">Nome</label>
        <input style="margin-top: 0px; margin-bottom: 20px;" type="text" class="container_input" placeholder="exemplo@gmail.com">
        <label class="label_digite_email">Cargo</label>
        <input style="margin-top: 0px; margin-bottom: 20px;"  type="text" class="container_input" placeholder="Senha(8 a 16 caracteres)">
        <label class="label_digite_email">Data de Nascimento</label>
        <input style="margin-top: 0px; margin-bottom: 20px;"  type="date" class="container_input" placeholder="Senha(8 a 16 caracteres)">
        <button style="margin-top: 10px;" type="button"  class="botao" onclick="botao_confirmar()">Confirmar</button>
      </form>
    </div>
    </main>
    <script type="module" src="/src/main.js"></script>
    <script>
      /*Interação do botão de confirmar*/
      function botao_confirmar(){
        window.location.href = "tela_de_Projetos.html";
      }

          /*Interação do Menu*/
      var status_menu = false; 

function abrir_opcoes_do_Menu(){

  status_menu = !status_menu;
  if(status_menu==true){
      document.getElementById("botao_menu").innerHTML = 
  `
  <div class="container_opcoes_menu">
      <ul>
          <li><button style=" font-size: 22pt;background-color: transparent; color: white;display: flex;justify-content: flex-start;align-items: center; border: transparent;">Tema Escuro<img src="imagens/lua.png" alt="img_sol" width="40px" height="40px" style="border-radius: 100%; margin-left: 10px;"></button></li>
          <li><a href="tela_de_Projetos.html">Meus Projetos</a></li>
          <li><a href="alterar_Login.html">Alterar Login</a></li>
          <li><a href="index.html">Sair</a></li>
      </ul>
  </div> 
  `
}else{document.getElementById("botao_menu").innerHTML = `<div></div>`}
  
}
    </script>
  </body>
</html>
